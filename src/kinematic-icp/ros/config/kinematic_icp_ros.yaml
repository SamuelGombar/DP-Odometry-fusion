/**:
  ros__parameters:
    # Preprocessing
    max_range: 7.0
    min_range: 0.0
    # Mapping parameters
    voxel_size: 1.0
    max_points_per_voxel: 20

    # Correspondence threshold parameters
    use_adaptive_threshold: true
    fixed_threshold: 1.0 # Ignored if use_adaptive_threshold=true

    # Registration Parameters
    max_num_iterations: 10
    convergence_criterion: 0.001
    max_num_threads: 1
    use_adaptive_odometry_regularization: true
    fixed_regularization: 0.0 # Ignored if use_adaptive_odometry_regularization=true

    # Motion Compensation
    # Disabled: 2D lidar has no per-point timestamps (time_increment=0 → all-equal
    # timestamps → 0/0=NaN normalization → undefined behaviour in VoxelHashMap)
    deskew: false

    # Covariance diagonal values
    orientation_covariance: 0.1
    position_covariance: 0.1
